<!DOCTYPE html>

<head>
    <title>Register Page</title>
    <style>
        .header-all {
            padding-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .head-logo {
            margin-bottom: auto;
            margin-top: auto;

        }

        .head-content {
            text-align: center;
        }

        .form-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-left: auto;
            margin-right: auto;
            background-color: white;
            width: fit-content;
            padding: 30px;
            border-radius: 10px;
            border-style:groove;
            border-color:white;           
        }

        .textbox {
            width: 400px;
            height: 40px;
            border-radius: 10px;
            border-color: rgb(169, 169, 169);
            border-width: 1;
            background-color: rgb(169, 169, 169, 0.1);
        }
        .textbox-unique{
            width: 400px;
            height: 50px;
            border-radius: 10px;
            border-color: rgb(200, 231, 231);
            background-color: rgb(200, 231, 231, 0.1);
            color: blue;
            text-align: center;
            font-size: larger;
            font-weight: bolder;
        }

        label {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: bolder;
        }

        span {
            color: red;
        }

        button {
            height: 40px;
            width: 400px;
            border-radius: 30;
            background-color: rgb(55, 0, 255);
            color: white;
            font-size: larger;
            border-color: blue;
            border-radius: 10px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding: auto;
        }

        .each-fields {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #question{
            height: 80px;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-all">
            <div class="head-logo">
                <img src="./asserts/Images/tnpsc_logo.jpg" alt="TN_LOGO">
            </div>
            <div class="head-content">
                <h1 style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">TAMILNADU PUBLIC
                    SERVICE COMMISSION</h1>
                <h4>COMBINED CIVIL SERVICES EXAMINATION-II</h4>
                <h4>(GROUP-II SERVICES) (NOTIFICATION NO. 11/2025)</h4>
                <h3>DATE OF MAIN EXAMINATION: 22.02.2026 FN AND 15.03.2026 AN</h3>
            </div>
        </div>

    </header>
    <hr>
    <br>

    <main>
        <form method="post">
            <div class="form-container">
                <div class="each-fields">
                    <div>
                        <label for="Reg_no">Register No</label>
                        <span>*</span>
                    </div>
                    <div>
                        <input type="text" name="Register_num" id="Reg_no" required class="textbox" maxlength="15" minlength="5">
                    </div>
                </div>
                <div class="each-fields">
                    <div>
                        <label for="DOB" >Date of Birth</label>
                        <span>*</span>
                    </div>
                    <div>
                        <input type="date" max="2026-07-02" required name="dateofbirth" id="DOB" class="textbox" >
                    </div>
                </div>
                <div class="each-fields">
                    <div>
                        <label for="VQ">Verification Question</label>
                        <span>*</span>
                    </div>
                    <div>
                        <input type="text" readonly value="What is 18 + 5 ?" name="question " class="textbox-unique" id="Question"><br><br>
                        <input type="number" name="Answer" id="VQ" placeholder="Enter answer (number)" class="textbox">
                    </div>
                </div>
                <div>
                    <button type="submit" >Submit</button>
                </div>
                <div>
                    <button>Back</button>
                </div>
            </div>
        </form>
    </main>
    <br>
    <footer>
        <marquee behavior="" direction=""><p>&copy;Tamil Nadu Public Service Commission (TNPSC).All Rights Reseverd</p></marquee>
    </footer>
</body>
