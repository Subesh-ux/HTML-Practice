<!DOCTYPE html>
<html>
    <head>
        <title>
            List
        </title>
        <style>
            .Listing{
                text-align: left;
                
            }
            dt{
                font-weight: bold;
                
            }
        </style>
    </head>
    <body>
        <h1 style="text-align: center;">
            Lists
        </h1>
        <div class="Listing">
        <h3>
            Ordered List
        </h3>
        <ol>
            <li>Apple</li>
            <li>Orange</li>
            <li>Banana</li>
        </ol>
        <hr>
        <h3>UNorder List</h3>
        <ul>
            <li>Cricket</li>
            <li>football</li>
            <li>Baseball</li>
        </ul>
        <hr>
        <h3>Description</h3>
        <dl>
            <dt>
                Tomato
            </dt>
            <dd>It is an Vegetable</dd>
            <dt>
                Virat Kholi
            </dt>
            <dd>He is a Cricket Player</dd>
            <dt>Joseph Vijay</dt>
            <dd>Chief Minister Of TamilNadu</dd>
        </dl>
        </div>

    </body>
</html>
